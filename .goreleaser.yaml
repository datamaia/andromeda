# goreleaser configuration (ADR-013, Volume 14). Builds cross-platform binaries, checksums,
# SBOMs, cosign signatures, and SLSA provenance, and publishes a GitHub Release plus a Homebrew
# tap. The macOS + Linux (x86_64/arm64) build matrix realizes the Tier 1 platform set; macOS
# Developer ID notarization is PENDING VALIDATION (Volume 1 open questions) and added when the
# signing identity is available.
version: 2

project_name: andromeda

before:
  hooks:
    - go mod tidy

builds:
  - id: andromeda
    main: ./cmd/andromeda
    binary: andromeda
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/datamaia/andromeda/internal/buildinfo.version={{.Version}}
      - -X github.com/datamaia/andromeda/internal/buildinfo.commit={{.Commit}}
      - -X github.com/datamaia/andromeda/internal/buildinfo.date={{.Date}}

archives:
  - id: andromeda
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

# macOS notarization (ADR-013). Ready to activate: it enables only when the signing identity
# is provisioned (MACOS_SIGN_P12 present), since an Apple Developer ID is required (open
# question OQ-003). Until then it is a no-op and the pipeline still ships checksums, cosign
# signatures, and provenance.
notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      sign:
        certificate: "{{.Env.MACOS_SIGN_P12}}"
        password: "{{.Env.MACOS_SIGN_PASSWORD}}"
      notarize:
        issuer_id: "{{.Env.MACOS_NOTARY_ISSUER_ID}}"
        key_id: "{{.Env.MACOS_NOTARY_KEY_ID}}"
        key: "{{.Env.MACOS_NOTARY_KEY}}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - artifacts: archive

signs:
  - cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--yes"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
    artifacts: checksum

# Homebrew cask (goreleaser v2 replaced the deprecated `brews`/formula block with
# `homebrew_casks`). A cask installs the prebuilt binary rather than compiling from source.
homebrew_casks:
  - name: andromeda
    binaries:
      - andromeda
    repository:
      owner: datamaia
      name: homebrew-tap
      # goreleaser requires the token field to be exactly a {{ .Env.VAR }} reference (no other
      # interpolation). The release workflow always sets HOMEBREW_TAP_TOKEN (secret or empty).
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    # The default Actions GITHUB_TOKEN is scoped to this repository only and cannot push to
    # the separate tap repo. Cask upload therefore activates only once a HOMEBREW_TAP_TOKEN
    # secret with write access to datamaia/homebrew-tap is provisioned; until then goreleaser
    # still generates the cask locally but skips the cross-repo push, so the release succeeds
    # without a tap. (ADR-013, Volume 14; tracked in STATUS.md.)
    skip_upload: '{{ if index .Env "HOMEBREW_TAP_TOKEN" }}false{{ else }}true{{ end }}'
    description: "Your terminal companion for shipping great software."
    homepage: "https://github.com/datamaia/andromeda"
    # Binaries are not yet Developer ID signed/notarized (the notarize block above activates
    # when MACOS_SIGN_P12 is provisioned). Until then, strip the Gatekeeper quarantine
    # attribute on install so the cask runs on macOS without a manual override.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/andromeda"]
          end

release:
  github:
    owner: datamaia
    name: andromeda
  draft: false
  prerelease: auto

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
