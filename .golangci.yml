# golangci-lint configuration (ADR-018). Pinned linter set; version is pinned in CI.
# Reference: https://golangci-lint.run
version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck        # unchecked errors
    - govet           # suspicious constructs
    - ineffassign     # ineffectual assignments
    - staticcheck     # broad static analysis
    - unused          # unused code
    - misspell        # common misspellings
    - revive          # style/lint rules
    - depguard        # dependency-rule enforcement (ADR-033; rules grow with the layer map)
    - bodyclose       # HTTP response bodies closed
    - gosec           # security issues

  settings:
    errcheck:
      # sql.Rows.Close returns the deferred iteration error, which is already surfaced via
      # rows.Err()/Scan; its Close error is not separately actionable. Standard exclusion.
      exclude-functions:
        - (*database/sql.Rows).Close
    depguard:
      rules:
        core-domain:
          # L0 core domain must not import runtime, adapters, or the CLI/TUI drivers.
          files:
            - "**/internal/core/**"
          deny:
            - pkg: github.com/datamaia/andromeda/internal/cli
              desc: "core domain (L0) must not depend on interface drivers"
            - pkg: github.com/datamaia/andromeda/internal/tui
              desc: "core domain (L0) must not depend on interface drivers"

  exclusions:
    # Test code deliberately ignores errors in setup/teardown and uses fixed paths,
    # sub-processes, and weak randomness for fixtures. errcheck and gosec on production
    # code stay fully enforced; excluding them from *_test.go is a standard, scoped choice.
    rules:
      - path: '_test\.go'
        linters:
          - errcheck
          - gosec

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
