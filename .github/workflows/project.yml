# Projects automation (Volume 11 chapters 05/06, FR-GH-008). Four automations on the
# "Andromeda Roadmap" board, each guarded on the ROADMAP_PROJECT_URL repository variable so the
# whole file is a no-op until the board and its token secret are provisioned (see
# scripts/setup_project.sh):
#
#   intake      issue opened / type:*-labeled  -> added to the board (lands in Backlog)
#   in-review   linked PR opened/reopened/ready -> linked issues to "In Review"
#   validation  linked PR merged               -> linked issues to "Validation"
#   released    release published              -> every "Validation" item to "Released" + stamp tag
#   dropped     issue closed as not-planned    -> item leaves the board (archived)
#
# Projects v2 are outside the default GITHUB_TOKEN, so a PAT with the `project` scope is supplied
# as the ROADMAP_PROJECT_TOKEN secret. The status transitions use `pull_request_target`, not
# `pull_request`: only that event exposes repository secrets to same-repo AND fork PRs, and it runs
# in the trusted base-repo context. It is safe here because no job ever checks out or executes
# PR-authored code — each transition job checks out the base repo and runs the committed
# scripts/project_sync.py, and every untrusted value (PR number, release tag) is passed through
# `env` rather than interpolated into a shell command (ADR-149; enforced by scripts/policy_check.py).
# Every action is pinned to a full commit SHA (ADR-149).
name: project

on:
  issues:
    types: [opened, labeled, closed]
  pull_request_target:
    types: [opened, reopened, ready_for_review, closed]
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  # Serialize per subject (issue / PR / release) so two events never race on the same board item,
  # while distinct subjects still run in parallel. Queue rather than cancel — every event matters.
  group: >-
    project-${{ github.event_name }}-${{ github.event.issue.number
    || github.event.pull_request.number || github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  intake:
    name: Add new issues to the roadmap
    runs-on: ubuntu-24.04
    if: >-
      github.event_name == 'issues'
      && github.event.action != 'closed'
      && vars.ROADMAP_PROJECT_URL != ''
    steps:
      - uses: actions/add-to-project@5afcf98fcd03f1c2f92c3c83f58ae24323cc57fd # v2.0.0
        with:
          project-url: ${{ vars.ROADMAP_PROJECT_URL }}
          github-token: ${{ secrets.ROADMAP_PROJECT_TOKEN }}
          labeled: type:bug,type:feature,type:security,type:docs,type:performance,type:refactor,type:architecture,type:research,type:tech-debt,type:release,type:provider-integration,type:tool-integration,type:mcp,type:plugin,type:platform-compat
          label-operator: OR

  dropped:
    name: Issue closed not-planned -> leave the board
    runs-on: ubuntu-24.04
    if: >-
      github.event_name == 'issues'
      && github.event.action == 'closed'
      && github.event.issue.state_reason == 'not_planned'
      && vars.ROADMAP_PROJECT_URL != ''
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Remove the issue's item from the board
        env:
          GH_TOKEN: ${{ secrets.ROADMAP_PROJECT_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: python3 scripts/project_sync.py drop --issue "$ISSUE_NUMBER"

  in-review:
    name: Linked PR opened -> In Review
    runs-on: ubuntu-24.04
    if: >-
      github.event_name == 'pull_request_target'
      && github.event.action != 'closed'
      && vars.ROADMAP_PROJECT_URL != ''
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Move linked issues to In Review
        env:
          GH_TOKEN: ${{ secrets.ROADMAP_PROJECT_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python3 scripts/project_sync.py pr-opened --pr "$PR_NUMBER"

  validation:
    name: Linked PR merged -> Validation
    runs-on: ubuntu-24.04
    if: >-
      github.event_name == 'pull_request_target'
      && github.event.action == 'closed'
      && github.event.pull_request.merged == true
      && vars.ROADMAP_PROJECT_URL != ''
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Move linked issues to Validation
        env:
          GH_TOKEN: ${{ secrets.ROADMAP_PROJECT_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python3 scripts/project_sync.py pr-merged --pr "$PR_NUMBER"

  released:
    name: Release published -> Released + stamp
    runs-on: ubuntu-24.04
    if: github.event_name == 'release' && vars.ROADMAP_PROJECT_URL != ''
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Move Validation items to Released and stamp the tag
        env:
          GH_TOKEN: ${{ secrets.ROADMAP_PROJECT_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: python3 scripts/project_sync.py release --tag "$RELEASE_TAG"
