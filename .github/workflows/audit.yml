# Nightly development audit (Volume 11 chapter 07; NFR-GH-001). A backstop that re-checks the
# workflow security posture and the recent commit-message conformance on main, and fails if
# either has drifted. The spec's full traceability chain audit assumes a pull-request-per-change
# flow; this repository also uses direct pushes, so the audit reports through the run status
# rather than filing issues (documented deviation).
name: audit

on:
  schedule:
    - cron: "17 5 * * *" # daily, 05:17 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history to walk recent commits
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Workflow security posture (drift check)
        run: python3 scripts/policy_check.py
      - name: Recent commit-message conformance
        run: |
          set -euo pipefail
          since=$(git rev-list -1 --before='7 days ago' HEAD 2>/dev/null || true)
          if [ -n "$since" ]; then
            echo "auditing $since..HEAD"
            bash scripts/check_commits.sh "${since}..HEAD"
          else
            root=$(git rev-list --max-parents=0 HEAD | tail -1)
            echo "history shorter than 7 days; auditing $root..HEAD"
            bash scripts/check_commits.sh "${root}..HEAD"
          fi
