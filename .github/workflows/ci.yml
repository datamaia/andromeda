# Quality-gate mirror of `make ci` (Volume 11 chapter 06).
#
# The repository is public, so Actions minutes are unlimited and the full Tier-1 platform
# matrix runs on every push and pull request: Linux and macOS on both amd64 and arm64 — the
# same platform set goreleaser ships (.goreleaser.yaml). The authoritative gate remains
# `make ci`; each matrix leg runs it end to end. `fail-fast: false` keeps every platform's
# result visible when one fails. Actions are pinned to major tags here; full commit-SHA
# pinning (ADR-149) is a hardening step tracked in STATUS.md.
name: ci

on:
  pull_request:
  push:
    branches: [main, "release/**"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: gate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, macos-14, macos-13]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Set up Python for spec lint
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.1.6
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Run the full local gate
        run: make ci
