# Quality-gate mirror of `make ci` (Volume 11 chapter 06).
#
# The repository is public, so Actions minutes are unlimited and the platform matrix runs on
# every push and pull request: Linux on amd64 and arm64, and macOS on arm64 (macos-14). Apple
# Intel (macos-13) is intentionally omitted — those hosted runners are being retired and queue
# unreliably; darwin/amd64 binaries are still built and shipped by goreleaser (.goreleaser.yaml)
# and are exercised indirectly by the macOS (darwin code) and ubuntu-amd64 (amd64) legs. The
# authoritative gate remains `make ci`; each matrix leg runs it end to end. `fail-fast: false`
# keeps every platform's result visible when one fails. Every action is pinned to a full commit
# SHA (ADR-149) with its version in a trailing comment; Dependabot updates the pins.
name: ci

on:
  pull_request:
  push:
    branches: [main, "release/**"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: gate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, macos-14]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Set up Python for spec lint
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install golangci-lint
        # Pinned to a release built with Go >= the go.mod target (go 1.25): golangci-lint
        # refuses to run when its own build Go is older than the analyzed module's Go version.
        # The install script is fetched from the matching version tag so its embedded checksums
        # correspond to the downloaded binary.
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/v2.12.2/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.12.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Run the full local gate
        run: make ci
