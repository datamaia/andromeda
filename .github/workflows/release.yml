# Release pipeline (Volume 11 chapter 06, ADR-013). Runs on a version tag: builds the matrix,
# signs with keyless cosign (OIDC), attaches SBOMs and provenance, and publishes the release.
# Least-privilege token; id-token for cosign. Every action is pinned to a full commit SHA
# (ADR-149) with its version in a trailing comment; Dependabot updates the pins.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      contents: write # publish the GitHub Release
      id-token: write # cosign keyless signing (OIDC)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Cross-repo token so goreleaser can push the cask to datamaia/homebrew-tap (the
          # default GITHUB_TOKEN cannot). When unset the value is empty and the cask upload is
          # skipped (see .goreleaser.yaml skip_upload), so the release still succeeds.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
