# Workflow security policy check (Volume 11 chapter 06, FR-GH-012; ADR-149). Mechanically
# enforces the workflow security posture — explicit permissions blocks, full-SHA action pins,
# no pull_request_target PR-code checkout, environment-gated privileged jobs, GitHub-hosted
# runners — via scripts/policy_check.py, plus the repository structure check (FR-GH-002) and
# label-taxonomy data validation. Runs on any change to workflows or scripts. Every action here
# is itself pinned to a full commit SHA, and the check self-applies to this file.
name: policy

on:
  pull_request:
    paths: [".github/**", "scripts/**"]
  push:
    branches: [main]
    paths: [".github/**", "scripts/**"]

permissions:
  contents: read

concurrency:
  group: policy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  policy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Workflow security policy (FR-GH-012, ADR-149)
        run: python3 scripts/policy_check.py
      - name: Repository structure (FR-GH-002)
        run: bash scripts/structure_check.sh
