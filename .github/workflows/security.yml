# Security scanning (Volume 11 chapter 06, FR-GH-010). CodeQL static analysis for Go plus a
# dependency vulnerability audit (govulncheck). Runs on pull requests, pushes to main, and a
# weekly schedule. Least-privilege tokens per ADR-149; CodeQL needs security-events: write to
# upload results to the Security tab. Every action is pinned to a full commit SHA (ADR-149).
name: security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "37 4 * * 1" # Mondays 04:37 UTC

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: codeql (go)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v3
        with:
          languages: go
      - uses: github/codeql-action/autobuild@7188fc363630916deb702c7fdcf4e481b751f97a # v3
      - uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v3
        with:
          category: "/language:go"

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Audit the module for called vulnerabilities
        run: govulncheck ./...
