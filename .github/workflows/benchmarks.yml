# Benchmark suite (Volume 12 chapter 03, FR-PERF-005). Runs the Go micro-benchmark tier
# (`make bench`), summarizes the results with benchstat, and uploads them as an artifact.
# Report-only, not a required check (matches the chapter-06 inventory). The operation and
# scenario tiers, calibrated reference machines, and rolling-baseline regression gating remain
# future work (STATUS.md). Every action is pinned to a full commit SHA (ADR-149).
name: benchmarks

on:
  pull_request:
    paths: ["**/*.go", "go.mod", "go.sum"]
  push:
    branches: [main]
    paths: ["**/*.go", "go.mod", "go.sum"]
  schedule:
    - cron: "41 4 * * 1" # weekly, Mondays 04:41 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: benchmarks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run the micro-benchmark suite
        run: |
          set -euo pipefail
          go test -run '^$' -bench=. -benchmem -benchtime=100ms -count=6 ./... | tee bench.txt
      - name: Summarize with benchstat
        run: |
          go install golang.org/x/perf/cmd/benchstat@latest
          benchstat bench.txt | tee bench-summary.txt
      - name: Upload benchmark results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmarks-${{ github.sha }}
          path: |
            bench.txt
            bench-summary.txt
