# Label taxonomy synchronization (Volume 11 chapters 05/07, FR-GH-007). When the label data on
# main changes, upsert the repository labels from .github/labels.yml (create or update; existing
# labels absent from the file are left alone). Also runnable on demand.
name: labels

on:
  push:
    branches: [main]
    paths: [".github/labels.yml"]
  workflow_dispatch:

permissions:
  contents: read
  issues: write # manage repository labels

concurrency:
  group: labels
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Sync labels from .github/labels.yml
        run: python3 scripts/sync_labels.py
        env:
          GH_TOKEN: ${{ github.token }}
