# Label taxonomy as data (Volume 11 chapter 05). Synchronized to the repository by the
# labels workflow (FR-GH-007). Colors are hex without the leading '#'.

# Type
- name: "type:bug"
  color: "d73a4a"
  description: "A defect in existing behavior"
- name: "type:feature"
  color: "0e8a16"
  description: "New capability"
- name: "type:security"
  color: "b60205"
  description: "Security issue or hardening"
- name: "type:docs"
  color: "0075ca"
  description: "Documentation"
- name: "type:performance"
  color: "fbca04"
  description: "Performance work"
- name: "type:refactor"
  color: "5319e7"
  description: "Internal restructuring, no behavior change"
- name: "type:architecture"
  color: "1d76db"
  description: "Architecture or contract decision"
- name: "type:research"
  color: "c5def5"
  description: "Investigation or spike"
- name: "type:tech-debt"
  color: "e99695"
  description: "Deliberate debt to repay"
- name: "type:release"
  color: "006b75"
  description: "Release coordination"
- name: "type:provider-integration"
  color: "0e8a16"
  description: "Provider adapter"
- name: "type:tool-integration"
  color: "0e8a16"
  description: "Tool integration"
- name: "type:mcp"
  color: "0e8a16"
  description: "Model Context Protocol"
- name: "type:plugin"
  color: "0e8a16"
  description: "Plugin"
- name: "type:platform-compat"
  color: "bfd4f2"
  description: "Platform compatibility"

