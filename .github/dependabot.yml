version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    groups:
      go-dependencies:
        patterns: ["*"]
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build"
      include: scope

  - package-ecosystem: gomod
    directory: "/sdk"
    schedule:
      interval: weekly
    groups:
      sdk-dependencies:
        patterns: ["*"]
    commit-message:
      prefix: "build"
      include: scope

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci"
      include: scope
